---
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
name: Generate CKAN files
jobs:
  generate:
    permissions:
      contents: write
      pull-requests: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install NetKAN
        run: |
          curl -L -o netkan.exe https://ksp-ckan.s3-us-west-2.amazonaws.com/netkan.exe

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate CKAN files
        env:
          NETKAN_PATH: ${{ github.workspace }}\netkan.exe
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python gen_all.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $env:GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Update CKAN files"
          title: "Update CKAN files"
          body: "This PR updates the CKAN files generated by gen.py."